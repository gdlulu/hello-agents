services:
  app:
    image: hello-agents
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - .:/workspace
    command: sleep infinity
    stdin_open: true
    tty: true